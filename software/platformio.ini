; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:lilygo-t-display]
platform = espressif32
board = lilygo-t-display
#framework = arduino
framework = espidf
monitor_speed = 115200
board_build.mcu = esp32
board_build.f_cpu = 240000000L
upload_protocol = esptool
; lib_deps = bodmer/TFT_eSPI@^2.5.43
platform_packages =
  tool-mkfatfs
  tool-mklittlefs
  tool-mkspiffs
build_unflags = -Werror=all
build_flags =
  -D DEBUG
  -D TFT_DISPLAY
  -D CONFIG_FREERTOS_USE_TRACE_FACILITY
  -D CONFIG_FREERTOS_GENERATE_RUN_TIME_STATS
  -D CONFIG_FREERTOS_USE_STATS_FORMATTING_FUNCTIONS
  -Wno-error=unused-const-variable
  -Wno-error=maybe-uninitialized
  -Wno-error=switch
; -D USER_SETUP_LOADED
; -include $PROJECT_INCLUDE_DIR/Setup_Newhaven_28_ST7789.h
; -include $PROJECT_LIBDEPS_DIR/$PIOENV/TFT_eSPI/User_Setups/Setup25_TTGO_T_Display.h
upload_port = /dev/ttyACM0
board_build.embed_txtfiles =
    managed_components/espressif__esp_insights/server_certs/https_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_mqtt_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_claim_service_server.crt
    managed_components/espressif__esp_rainmaker/server_certs/rmaker_ota_server.crt
